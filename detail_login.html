<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국자연공원협회 로그인 페이지</title>
    <link rel="stylesheet" href="./css/detail_login.css">
    <link rel="stylesheet" href="./css/detail_login_tab.css">
    <link rel="stylesheet" href="./css/detail_login_mo.css">


    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="all">
        <div class="login_page">
            <div class="green_box">
                <img src="./img/login_logo.png" alt="로그인 아이콘">
                <h3 class="login_txt">
                한국자연공원협회 회원님 <br>
                반갑습니다!
            </div>
        </h3>
    
            <form action="">
                <fieldset>
                    <label class="user_id" for="user_id">아이디</label>
                    <input type="text" id="user_id" required>
                    <br>
                    <label class="user_pw" for="user_pw">비밀번호</label>
                    <input type="password" id="user_pw" required>
                    <br>
                    <input class="login" type="submit" value="로그인">
                </fieldset>
                <fieldset>
                    <p class="que">아직 회원이 아니신가요?</p>
                    <input class="join" type="submit" value="회원가입">
                </fieldset>
            </form>
        </div>
    </div>
</body>
</html>
